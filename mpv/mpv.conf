# Video Renderer: gpu-next + Vulkan (Wayland native)
vo=gpu-next
gpu-api=vulkan
gpu-context=waylandvk
vulkan-async-compute=yes
vulkan-async-transfer=yes

# Hardware Decode
hwdec=vaapi
hwdec-codecs=all
vd-lavc-dr=yes

# Video Timing
video-sync=audio
interpolation=no
tscale=oversample

# Dithering
dither-depth=10
dither=error-diffusion
error-diffusion=sierra-lite

# Scaling
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
scale-antiring=0.6
cscale-antiring=0.6

# Chroma Upscaling Shader
glsl-shaders="~~/shaders/KrigBilateral.glsl"

# Debanding
deband=yes
deband-iterations=3
deband-threshold=35
deband-range=16
deband-grain=8

# HDR (HDR400 OLED, DCI-P3, 10-bit)
target-colorspace-hint=yes
target-colorspace-hint-mode=source-dynamic
target-trc=auto
target-prim=auto
target-peak=400
target-contrast=inf
target-gamut=dci-p3
tone-mapping=bt.2390
hdr-compute-peak=yes
hdr-peak-percentile=99.995
hdr-contrast-recovery=0.30
tone-mapping-max-boost=1.0
gamut-mapping-mode=perceptual

# Subtitles
sub-font="Netflix Sans"
sub-bold=yes
sub-font-size=35
sub-shadow-offset=1
sub-color="#FFFFFF"

# UI
fullscreen=yes
border=no
osc=no
osd-level=1
save-position-on-quit=yes
keep-open=yes
cursor-autohide=1000

# Profiles — content-adaptive settings
# 4K/UHD content — no luma upscaling needed, reduce unnecessary processing
[4k]
profile-desc=4K UHD content
profile-cond=(width >= 3840 and height >= 2160)
profile-restore=copy
deband=no
deband-iterations=0

# Anime — subtle CNN restoration for cleaner line art
# Uses Anime4K_Restore_CNN_Soft_VL (very light, negligible GPU cost)
[anime]
profile-desc=Anime content
profile-cond=((width == 1920 and height == 1080) or (width == 1280 and height == 720)) and (estimated-vf-fps <= 30)
profile-restore=copy
glsl-shaders-append="~~/shaders/Anime4K_Restore_CNN_Soft_VL.glsl"

# High framerate content (60fps+) — disable deband, keep it lean
[hfr]
profile-desc=High frame rate content
profile-cond=(estimated-vf-fps >= 55)
profile-restore=copy
deband=no
deband-iterations=0
